<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SentiMirror</title>

    <!--css file-->
    <link rel="stylesheet" href="style.css" />

    <!--font-->
    <link rel="stylesheet" href="https://use.typekit.net/mme6bmy.css">

    <!-- cdn sentiment analysis
    <script src="https://cdn.jsdelivr.net/npm/sentiment-analysis@0.1.2/index.min.js"></script> -->


  </head>
  <body>
    <div id="enter-screen">
      <h1>Are you ready to reflect?</h1>
      <p id="status">Speak "yes" or "ready" to enter</p>
    </div>

    <div id="main-content">
      <div class="mirror-wrapper">
        <video id="mirror" autoplay muted playsinline></video>
        <p id="question-display"></p>
      </div>
    </div>

    <!--js code-->
    <script src="script.js"></script>
  </body>
</html>
